name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Syntax-Smoke-Check ohne GUI/Abhaengigkeiten.
      # Echte Tests benoetigen GUI/Deps und laufen lokal via pytest.
      - name: Compile check
        run: python -m py_compile core.py exceltool.py
